# pytest.ini (project root)
[pytest]
# Test discovery paths
testpaths = tests

# Python path
pythonpath = fhe_dsl

# Python file patterns
python_files = test_*.py *_test.py

# Ignored directories
norecursedirs = .git .venv build dist

# Default options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Custom markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests (use -m "not slow" to skip)
    gpu: GPU tests
    ast: AST conversion tests
    torch: Torch conversion tests
    e2e: End-to-end tests
    benchmark: Performance benchmark tests
