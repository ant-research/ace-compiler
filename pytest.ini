# pytest.ini (project root)
[pytest]
# Test discovery paths
testpaths = tests

# Python path (allows running tests without pip install)
pythonpath = fhe_dsl/python

# Python file patterns
python_files = test_*.py *_test.py

# Ignored directories
norecursedirs = .git .venv build dist _disabled

# Default options
addopts =
    -v
    --tb=short
    --strict-markers

# Environment variables
env =
    ACE_LOG_LEVEL=DEBUG

# Custom markers
markers =
    slow: Slow tests (use -m "not slow" to skip)
    gpu: GPU tests requiring CUDA device (use -m "not gpu" to skip)