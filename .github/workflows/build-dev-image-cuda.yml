# ============================================================
# ACE-Compiler Dev Docker Image Build (CUDA)
#
# Builds and pushes CUDA dev Docker images to Docker Hub.
#
# Usage:
#   - Manual dispatch: build and push CUDA image
#   - Scheduled: rebuild images weekly
# ============================================================

name: Build Dev Image (CUDA)

on:
  push:
    branches:
      - master
      - 'release/*'
      - 'ci/*'
    #  - 'opensource/*'
  workflow_dispatch:
    inputs:
      cuda_version:
        description: 'CUDA version'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - '12.4.0'
          - '12.6.0'
          - '13.0.0'
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

env:
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-cuda-image:
    name: Build CUDA Image
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # CUDA 12.4 + torch 2.5.1 (cu124, also covers CUDA 12.5)
          - { cuda: "12.4.0", ubuntu: "22.04", torch: "2.5.1", torchvision: "0.20.1", torchaudio: "2.5.1", cu_version: "cu124", torch_index: "https://download.pytorch.org/whl/cu124", base: "nvidia/cuda:12.4.0-devel-ubuntu22.04" }
          # CUDA 12.6 + torch 2.6.0 (cu126)
          - { cuda: "12.6.0", ubuntu: "24.04", torch: "2.6.0", torchvision: "0.21.0", torchaudio: "2.6.0", cu_version: "cu126", torch_index: "https://download.pytorch.org/whl/cu126", base: "nvidia/cuda:12.6.0-devel-ubuntu24.04" }
          # CUDA 13.0 + torch 2.11.0 (cu130, latest)
          - { cuda: "13.0.0", ubuntu: "24.04", torch: "2.11.0", torchvision: "0.26.0", torchaudio: "2.11.0", cu_version: "cu130", torch_index: "https://download.pytorch.org/whl/cu130", base: "nvidia/cuda:13.0.0-devel-ubuntu24.04" }

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dev.cuda
          push: true
          tags: opencc/dev-cuda:${{ matrix.cuda }}-devel-ubuntu${{ matrix.ubuntu }}-torch${{ matrix.torch }}
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            PIP_INDEX_URL=https://pypi.org/simple
            TORCH_VERSION=${{ matrix.torch }}
            TORCHVISION_VERSION=${{ matrix.torchvision }}
            TORCHAUDIO_VERSION=${{ matrix.torchaudio }}
            CU_VERSION=${{ matrix.cu_version }}
            TORCH_INDEX_URL=${{ matrix.torch_index }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
