# ============================================================
# ACE-Compiler Dev Docker Image Build (CUDA)
#
# Builds and pushes CUDA dev Docker images to Docker Hub.
#
# Usage:
#   - Manual dispatch: build and push CUDA image
#   - Scheduled: rebuild images weekly
# ============================================================

name: Build Dev Image (CUDA)

on:
  push:
    branches:
      - master
      - 'release/*'
      - 'ci/*'
  workflow_dispatch:
    inputs:
      cuda_version:
        description: 'CUDA version'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - '12.4.0'
          - '12.5.0'
          - '12.6.0'
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

env:
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  build-cuda-image:
    name: Build CUDA Image
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - { cuda: "12.4.0", ubuntu: "22.04", torch: "2.5.0", torchvision: "0.20.0", torchaudio: "2.5.0", torch_index: "https://download.pytorch.org/whl/cu124", base: "nvidia/cuda:12.4.0-devel-ubuntu22.04" }
          - { cuda: "12.5.0", ubuntu: "22.04", torch: "2.5.0", torchvision: "0.20.0", torchaudio: "2.5.0", torch_index: "https://download.pytorch.org/whl/cu125", base: "nvidia/cuda:12.5.0-devel-ubuntu22.04" }
          - { cuda: "12.6.0", ubuntu: "24.04", torch: "2.6.0", torchvision: "0.21.0", torchaudio: "2.6.0", torch_index: "https://download.pytorch.org/whl/cu126", base: "nvidia/cuda:12.6.0-devel-ubuntu24.04" }

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dev.cuda
          push: true
          tags: opencc/dev-cuda:${{ matrix.cuda }}-devel-ubuntu${{ matrix.ubuntu }}
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            PIP_INDEX_URL=https://pypi.org/simple
            TORCH_VERSION=${{ matrix.torch }}
            TORCHVISION_VERSION=${{ matrix.torchvision }}
            TORCHAUDIO_VERSION=${{ matrix.torchaudio }}
            TORCH_INDEX_URL=${{ matrix.torch_index }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
